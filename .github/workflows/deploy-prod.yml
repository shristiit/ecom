name: Deploy Production

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      target:
        description: "Component to deploy"
        required: true
        type: choice
        default: all
        options:
          - all
          - backend
          - engine
          - admin
          - superadmin
      force_rebuild:
        description: "Force a fresh rebuild of the selected target"
        required: true
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deployment variables
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
            echo "force_rebuild=${{ github.event.inputs.force_rebuild }}" >> "$GITHUB_OUTPUT"
          else
            echo "target=all" >> "$GITHUB_OUTPUT"
            echo "force_rebuild=false" >> "$GITHUB_OUTPUT"
          fi
          echo "image_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}

      - name: Setup pnpm
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'admin' || steps.vars.outputs.target == 'superadmin'
        uses: pnpm/action-setup@v4
        with:
          version: 10.13.1
          run_install: false

      - name: Setup Node.js
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'admin' || steps.vars.outputs.target == 'superadmin'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace dependencies
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'admin' || steps.vars.outputs.target == 'superadmin'
        run: pnpm install --frozen-lockfile

      - name: Login to Amazon ECR
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'backend' || steps.vars.outputs.target == 'engine'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'backend'
        env:
          BACKEND_REPOSITORY: ${{ vars.AWS_BACKEND_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build -f backend/Dockerfile -t "${BACKEND_REPOSITORY}:${IMAGE_TAG}" .
          docker push "${BACKEND_REPOSITORY}:${IMAGE_TAG}"

      - name: Register backend task definition
        id: backend_task_def
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'backend'
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          BACKEND_OPENAI_API_KEY: ${{ secrets.BACKEND_OPENAI_API_KEY }}
          BACKEND_AUTH0_CLIENT_SECRET: ${{ secrets.BACKEND_AUTH0_CLIENT_SECRET }}
          BACKEND_SSO_GOOGLE_CLIENT_SECRET: ${{ secrets.BACKEND_SSO_GOOGLE_CLIENT_SECRET }}
          BACKEND_SSO_AZUREAD_CLIENT_SECRET: ${{ secrets.BACKEND_SSO_AZUREAD_CLIENT_SECRET }}
          BACKEND_SENTRY_DSN: ${{ secrets.BACKEND_SENTRY_DSN }}
        run: |
          TASK_DEFINITION_ARN="$(
            bash scripts/aws-register-ecs-task-def.sh \
              "${{ vars.AWS_BACKEND_TASK_FAMILY }}" \
              "backend" \
              "${{ vars.AWS_BACKEND_ECR_REPOSITORY }}:${IMAGE_TAG}"
          )"
          echo "task_definition_arn=${TASK_DEFINITION_ARN}" >> "$GITHUB_OUTPUT"

      - name: Deploy backend ECS service
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'backend'
        run: |
          bash scripts/aws-update-ecs-service.sh \
            "${{ vars.AWS_ECS_CLUSTER }}" \
            "${{ vars.AWS_BACKEND_SERVICE }}" \
            "${{ steps.backend_task_def.outputs.task_definition_arn }}"

      - name: Run backend migrations
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'backend'
        continue-on-error: true
        run: |
          bash scripts/aws-run-ecs-task.sh \
            "${{ vars.AWS_ECS_CLUSTER }}" \
            "${{ vars.AWS_BACKEND_SERVICE }}" \
            "${{ steps.backend_task_def.outputs.task_definition_arn }}" \
            "backend" \
            sh -lc "export PGSSLMODE=require; npm run db:ensure:runtime && npm run migrate:up:runtime"

      - name: Build and push conversational-engine image
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'engine'
        env:
          ENGINE_REPOSITORY: ${{ vars.AWS_ENGINE_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
        run: |
          docker build -f conversational-engine/Dockerfile -t "${ENGINE_REPOSITORY}:${IMAGE_TAG}" conversational-engine
          docker push "${ENGINE_REPOSITORY}:${IMAGE_TAG}"

      - name: Register conversational-engine task definition
        id: engine_task_def
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'engine'
        env:
          IMAGE_TAG: ${{ steps.vars.outputs.image_tag }}
          BACKEND_DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          BACKEND_OPENAI_API_KEY: ${{ secrets.BACKEND_OPENAI_API_KEY }}
          ENGINE_DATABASE_URL: ${{ secrets.ENGINE_DATABASE_URL }}
          ENGINE_LLM_API_KEY: ${{ secrets.ENGINE_LLM_API_KEY }}
          ENGINE_GEMINI_API_KEY: ${{ secrets.ENGINE_GEMINI_API_KEY }}
          ENGINE_DEEPSEEK_API_KEY: ${{ secrets.ENGINE_DEEPSEEK_API_KEY }}
        run: |
          TASK_DEFINITION_ARN="$(
            bash scripts/aws-register-ecs-task-def.sh \
              "${{ vars.AWS_ENGINE_TASK_FAMILY }}" \
              "conversational-engine" \
              "${{ vars.AWS_ENGINE_ECR_REPOSITORY }}:${IMAGE_TAG}"
          )"
          echo "task_definition_arn=${TASK_DEFINITION_ARN}" >> "$GITHUB_OUTPUT"

      - name: Run conversational-engine migrations
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'engine'
        run: |
          bash scripts/aws-run-ecs-task.sh \
            "${{ vars.AWS_ECS_CLUSTER }}" \
            "${{ vars.AWS_ENGINE_SERVICE }}" \
            "${{ steps.engine_task_def.outputs.task_definition_arn }}" \
            "conversational-engine" \
            sh -lc "PYTHONPATH=src uv run python -m conversational_engine.scripts.ensure_db && uv run alembic upgrade head"

      - name: Deploy conversational-engine ECS service
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'engine'
        run: |
          bash scripts/aws-update-ecs-service.sh \
            "${{ vars.AWS_ECS_CLUSTER }}" \
            "${{ vars.AWS_ENGINE_SERVICE }}" \
            "${{ steps.engine_task_def.outputs.task_definition_arn }}"

      - name: Build admin site
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'admin'
        env:
          ADMIN_DEFAULT_MODE: prod
          ADMIN_PROD_API_URL: https://api.stockaisle.com/api
          EXPO_PUBLIC_API_URL: https://api.stockaisle.com/api
          EXPO_PUBLIC_CONVERSATIONAL_ENGINE_URL: https://engine.stockaisle.com
          EXPO_PUBLIC_ENABLE_MFA: "false"
          EXPO_PUBLIC_PORTAL_MODE: business
          EXPO_PUBLIC_SSO_URL: ""
        run: pnpm --filter admin build:prod

      - name: Deploy admin static assets
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'admin'
        run: bash scripts/aws-deploy-static.sh admin/dist "${{ vars.AWS_ADMIN_BUCKET }}" "${{ vars.AWS_ADMIN_DISTRIBUTION_ID }}"

      - name: Build superadmin site
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'superadmin'
        env:
          ADMIN_PROD_API_URL: https://api.stockaisle.com/api
          EXPO_PUBLIC_API_URL: https://api.stockaisle.com/api
          EXPO_PUBLIC_CONVERSATIONAL_ENGINE_URL: https://engine.stockaisle.com
          EXPO_PUBLIC_ENABLE_MFA: "false"
          EXPO_PUBLIC_PLATFORM_HOSTNAME: master.stockaisle.com
          EXPO_PUBLIC_PORTAL_MODE: platform
          EXPO_PUBLIC_SSO_URL: ""
        run: pnpm --filter superadmin build:prod

      - name: Deploy superadmin static assets
        if: steps.vars.outputs.target == 'all' || steps.vars.outputs.target == 'superadmin'
        run: bash scripts/aws-deploy-static.sh superadmin/dist "${{ vars.AWS_SUPERADMIN_BUCKET }}" "${{ vars.AWS_SUPERADMIN_DISTRIBUTION_ID }}"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "## Production deploy"
            echo
            echo "- Target: \`${{ steps.vars.outputs.target }}\`"
            echo "- Image tag: \`${{ steps.vars.outputs.image_tag }}\`"
            echo "- Force rebuild: \`${{ steps.vars.outputs.force_rebuild }}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
          } >> "$GITHUB_STEP_SUMMARY"
