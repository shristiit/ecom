name: Terraform Plan

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-prod
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ops/terraform
    env:
      AWS_REGION: eu-west-2
      TF_VAR_aws_region: eu-west-2
      TF_VAR_project: stockaisle
      TF_VAR_environment: prod
      TF_VAR_domain_name: stockaisle.com
      TF_VAR_route53_zone_name: stockaisle.com
      TF_VAR_github_repository: ${{ github.repository }}
      TF_VAR_existing_vpc_id: ${{ vars.AWS_VPC_ID }}
      TF_VAR_existing_public_subnet_ids_csv: ${{ vars.AWS_PUBLIC_SUBNET_IDS }}
      TF_VAR_existing_rds_security_group_id: ${{ vars.AWS_RDS_SECURITY_GROUP_ID }}
      TF_VAR_alarm_email: ${{ vars.AWS_ALARM_EMAIL }}
      TF_VAR_enable_landing_site: "false"
      TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_LOCK_TABLE: ${{ vars.TF_STATE_LOCK_TABLE }}
      TF_STATE_KEY: ${{ vars.TF_STATE_KEY }}
      TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_TERRAFORM_ROLE_ARN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Validate Terraform backend inputs
        run: |
          : "${TF_STATE_BUCKET:?Missing TF_STATE_BUCKET GitHub variable}"
          : "${TF_STATE_LOCK_TABLE:?Missing TF_STATE_LOCK_TABLE GitHub variable}"
          : "${TF_STATE_REGION:=eu-west-2}"

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY:-prod/terraform.tfstate}" \
            -backend-config="region=${TF_STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Import existing AWS resources
        run: ./import_existing.sh

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform plan summary
        run: |
          {
            echo "## Terraform plan"
            echo
            terraform show -no-color tfplan | sed -n '1,220p'
          } >> "$GITHUB_STEP_SUMMARY"
